version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: seo_tool_redis
    restart: always

  web:
    build: .
    container_name: seo_tool_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  celery:
    build: .
    container_name: seo_tool_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
